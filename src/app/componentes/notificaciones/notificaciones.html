<!-- ==================== notificaciones.component.html ==================== -->

<!-- VERSIÓN DESKTOP -->
<div *ngIf="!isMobile" class="notification-container relative">
  <button (click)="toggleNotifications($event)"
          class="notification-toggle relative p-2 rounded-md transition"
          [ngClass]="[currentTheme.textSecondaryClass || '', currentTheme.hoverText || '']"
          aria-label="Notificaciones">
    <i class="fas fa-bell text-lg" aria-hidden="true"></i>
    <span *ngIf="notificationsCount > 0"
          class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold shadow-lg">
      {{ notificationsCount }}
    </span>
  </button>

  <!-- Dropdown Notificaciones DESKTOP -->
  <div *ngIf="showNotifications"
       class="notification-panel border rounded-xl shadow-2xl overflow-hidden absolute right-0 top-full mt-2 w-96 z-50"
       [ngClass]="[currentTheme.cardBg || '']">
    <!-- Header sin gradiente, con color de tema -->
    <div class="px-5 py-4 border-b flex items-center justify-between"
         [ngClass]="[currentTheme.borderColor || '']">
      <div class="flex items-center gap-2">
        <i class="fas fa-bell text-xl" [ngClass]="currentTheme.accentColor || ''"></i>
        <h3 class="font-bold text-lg" [ngClass]="currentTheme.textPrimaryClass || ''">
          Notificaciones
        </h3>
      </div>
     
    </div>

    <div class="max-h-96 overflow-y-auto">
      <div *ngIf="notifications.length === 0" class="px-4 py-8 text-center" [ngClass]="currentTheme.textSecondaryClass || ''">
        <i class="fas fa-bell-slash text-4xl mb-2 opacity-50"></i>
        <p class="text-sm">No tienes notificaciones</p>
      </div>

      <a *ngFor="let notification of notifications"
         href="#"
         (click)="markAsRead(notification.id); $event.preventDefault(); $event.stopPropagation()"
         class="flex items-start gap-3 px-4 py-3 transition-all duration-300 border-b group relative"
         [ngClass]="[currentTheme.hoverBgLight || '', currentTheme.borderColor || '']">
        <div [style.background]="notification.avatarColor"
             class="w-10 h-10 rounded-full flex items-center justify-center text-white font-semibold text-sm flex-shrink-0">
          {{ notification.initials }}
        </div>

        <div class="flex-1 min-w-0">
          <p class="text-sm" [ngClass]="currentTheme.textPrimaryClass || ''">
            <span class="font-semibold" [ngClass]="currentTheme.textPrimary || ''">{{ notification.user }}</span>
            {{ notification.action }}
          </p>
          <p class="text-xs mt-1" [ngClass]="currentTheme.textSecondaryClass || ''">{{ notification.time }}</p>
        </div>

        <div *ngIf="notification.isUnread"
             class="w-2 h-2 rounded-full flex-shrink-0 mt-2 shadow-sm"
             [ngClass]="currentTheme.bgPrimary || ''"></div>

        <button (click)="deleteNotification(notification.id); $event.stopPropagation(); $event.preventDefault()"
                class="opacity-0 group-hover:opacity-100 absolute top-2 right-2 hover:text-red-500 transition-opacity"
                [ngClass]="currentTheme.textSecondaryClass || ''"
                aria-label="Eliminar notificación">
          <i class="fas fa-times text-sm"></i>
        </button>
      </a>
    </div>
  </div>
</div>

<!-- VERSIÓN MÓVIL (Botón + Panel Full-Screen) -->
<div *ngIf="isMobile" class="notification-container">
  <button (click)="toggleNotifications($event)"
          class="notification-toggle relative p-2 rounded-md transition"
          [ngClass]="[currentTheme.textSecondaryClass || '', currentTheme.hoverText || '']"
          aria-label="Notificaciones">
    <i class="fas fa-bell text-lg" aria-hidden="true"></i>
    <span *ngIf="notificationsCount > 0"
          class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold shadow-lg">
      {{ notificationsCount }}
    </span>
  </button>

  <!-- Panel Móvil Full-Screen -->
  <div *ngIf="showNotifications" 
       class="notification-panel fixed inset-0 z-50 overflow-y-auto" 
       [ngClass]="currentTheme.cardBg || ''">
    <!-- Header sin gradiente, con fondo del tema -->
    <div class="sticky top-0 z-10 px-6 py-4 border-b"
         [ngClass]="[currentTheme.cardBg || '', currentTheme.borderColor || '']">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-3">
          <i class="fas fa-bell text-2xl" [ngClass]="currentTheme.accentColor || ''"></i>
          <h3 class="font-bold text-xl" [ngClass]="currentTheme.textPrimaryClass || ''">
            Notificaciones
          </h3>
        </div>
        <button (click)="closeNotifications()" 
                class="p-2 rounded-lg transition-all duration-200 hover:scale-110"
                [ngClass]="[currentTheme.textSecondaryClass || '', currentTheme.hoverBgLight || '']"
                aria-label="Cerrar">
          <i class="fas fa-times text-2xl"></i>
        </button>
      </div>
     
    </div>

    <div class="pb-4">
      <div *ngIf="notifications.length === 0" class="px-4 py-20 text-center" [ngClass]="currentTheme.textSecondaryClass || ''">
        <i class="fas fa-bell-slash text-6xl mb-4 opacity-50"></i>
        <p class="text-lg">No tienes notificaciones</p>
      </div>

      <a *ngFor="let notification of notifications"
         href="#"
         (click)="markAsRead(notification.id); $event.preventDefault(); $event.stopPropagation()"
         class="flex items-start gap-4 px-6 py-4 transition-all duration-300 border-b active:opacity-75 relative"
         [ngClass]="[currentTheme.hoverBgLight || '', currentTheme.borderColor || '']">
        <div [style.background]="notification.avatarColor"
             class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-base flex-shrink-0 shadow-sm">
          {{ notification.initials }}
        </div>

        <div class="flex-1 min-w-0">
          <p class="text-base" [ngClass]="currentTheme.textPrimaryClass || ''">
            <span class="font-semibold" [ngClass]="currentTheme.textPrimary || ''">{{ notification.user }}</span>
            {{ notification.action }}
          </p>
          <p class="text-sm mt-1" [ngClass]="currentTheme.textSecondaryClass || ''">{{ notification.time }}</p>
        </div>

        <div class="flex flex-col items-end gap-2">
          <div *ngIf="notification.isUnread"
               class="w-3 h-3 rounded-full shadow-sm"
               [ngClass]="currentTheme.bgPrimary || ''"></div>
          <button (click)="deleteNotification(notification.id); $event.stopPropagation(); $event.preventDefault()"
                  class="p-2 rounded-lg transition-all duration-200 hover:scale-110"
                  [ngClass]="[currentTheme.textSecondaryClass || '', 'hover:text-red-500']">
            <i class="fas fa-trash text-sm"></i>
          </button>
        </div>
      </a>
    </div>
  </div>
</div>
